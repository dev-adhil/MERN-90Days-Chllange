<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spotify Login</title>
  <link rel="stylesheet" href="Login.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <div class="login-box">
      <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg" alt="Spotify" class="logo">
      <h1>Log in to Spotify</h1>
      <div class="social-buttons">
        <button class="google">Continue with Google</button>
        <button class="facebook">Continue with Facebook</button>
        <button class="apple">Continue with Apple</button>
        <button class="phone">Continue with phone number</button>
      </div>
      <hr>
      <form>
        <label for="email">Email or username</label>
        <input type="text" id="email" placeholder="Email or username" />
        <button class="continue-btn">Continue</button>
      </form>
      <p class="signup-text">
        Don't have an account? <a href="#">Sign up for Spotify</a>
      </p>
    </div>
  </div>
</body>
</html>
